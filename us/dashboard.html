let sortKey='total',sortDir=-1,scFilter='all';
const FILTERS=[['all','전체'],['nh','RS 신고가'],['sig','오늘 시그널'],['cand','구조 후보'],['rs90','RS 90+']];
function goScreener(f){scFilter=f||'all';const btns=[...document.querySelectorAll('.tab')];
  const t=btns.find(b=>b.textContent.includes('스크리너'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));if(t)t.classList.add('on');renderScreener();}
function matchFilter(r){
  if(scFilter==='all')return true;
  if(scFilter==='nh')return !!r.rs_new_high_252;
  if(scFilter==='rs90')return (r.rs_rating||0)>=90;
  const g=r.gates||{};const keys=Object.keys(g);
  if(scFilter==='sig')return keys.length&&keys.every(k=>g[k]);
  if(scFilter==='cand')return keys.length&&keys.filter(k=>k!=='G3').every(k=>g[k]);
  return true;
}
function renderScreener(){
  const cols=[['ticker','종목'],['price','현재가'],['rs_rating','RS'],['stage','단계'],['total','종합'],['ad_score','A/D'],['pattern','패턴'],['dist_to_pivot_pct','피벗까지%'],['pct_from_high','고점대비%']];
  const chips=FILTERS.map(f=>`<button class="btn" style="padding:3px 10px;${scFilter===f[0]?'background:#185FA5;color:#fff;border-color:#185FA5':''}" onclick="scFilter='${f[0]}';fillScreener();syncChips()">${f[1]}</button>`).join(' ');
  let h=`<div class="panel"><div class="p-t">📋 스크리너 <span class=muted>· 헤더 클릭 정렬</span></div>
    <div id="chips" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${chips}</div>
    <div style="overflow-x:auto"><table id="sctbl"><thead><tr>`;
  cols.forEach(c=>{const isnum=!['ticker','pattern'].includes(c[0]);h+=`<th class="${isnum?'num':''}" onclick="sortSc('${c[0]}')">${c[1]}</th>`;});
  h+=`</tr></thead><tbody id="scbody"></tbody></table></div></div>`;
  document.getElementById('main').innerHTML=h;fillScreener();
}
function syncChips(){const c=document.getElementById('chips');if(!c)return;
  [...c.children].forEach((b,i)=>{const on=FILTERS[i][0]===scFilter;b.style.background=on?'#185FA5':'#fff';b.style.color=on?'#fff':'#1a1a18';b.style.borderColor=on?'#185FA5':'#d3d1c7';});}
function fillScreener(){
  const q=(document.getElementById('q').value||'').toUpperCase().trim();
  let rows=(S.screener||[]).filter(r=>matchFilter(r)&&(!q||r.ticker.includes(q)));
  rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];if(x==null)x=-1e9;if(y==null)y=-1e9;
    if(typeof x==='string')return sortDir*x.localeCompare(y);return sortDir*(x-y);});
  document.getElementById('scbody').innerHTML=rows.map(r=>`<tr>
    <td><span class=sym>${r.ticker}</span></td>
    <td class=num>$${(r.price||0).toFixed(2)}</td>
    <td>${rsCell(r.rs_rating)}</td>
    <td>${stg(r.stage)}</td>
    <td class=num>${r.total??''}</td>
    <td class=num>${r.ad_score??''}</td>
    <td>${patB(r.pattern)}</td>
    <td class=num>${r.dist_to_pivot_pct!=null?r.dist_to_pivot_pct.toFixed(1)+'%':''}</td>
    <td class=num>${r.pct_from_high!=null?r.pct_from_high.toFixed(1)+'%':''}</td></tr>`).join('')
    || '<tr><td colspan=9 class=muted style="padding:16px">검색 결과가 없습니다.</td></tr>';
}
function sortSc(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}fillScreener();}

/* ---------- STRATEGY (전략실) TAB ---------- */
function eqSvg(hist,bench){if(!hist||!hist.length)return '<div class=muted style="padding:14px">데이터 축적 중</div>';
  let pts=hist.map(h=>h.equity);if(pts.length==1)pts=[pts[0],pts[0]];
  let bp=(bench&&bench.length)?bench.map(h=>h.equity):null;if(bp&&bp.length==1)bp=[bp[0],bp[0]];
  const all=pts.concat(bp||[]);
  const lo=Math.min(...all),hi=Math.max(...all),rng=(hi-lo)||1,W=640,H=130;
  const X=(i,n)=>8+(W-16)*i/((n-1)||1), Y=v=>10+(H-24)*(1-(v-lo)/rng);
  const line=pts.map((v,i)=>X(i,pts.length).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  const c=pts[pts.length-1]>=pts[0]?'#C0392B':'#1565C0';
  let bl='';
  if(bp){const b=bp.map((v,i)=>X(i,bp.length).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
    bl=`<polyline points="${b}" fill=none stroke="#999" stroke-width="1.5" stroke-dasharray="4 3"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px" preserveAspectRatio=none>
    ${bl}<polyline points="${line}" fill=none stroke="${c}" stroke-width=2/>
    <text x="8" y="10" font-size="9" fill="#999">— 우리 · - - SPY(회색)</text></svg>`;}

        <div><span class=muted style="font-size:11px">초과수익(알파)</span><div style="font-size:20px;font-weight:800" class="${ac}">${a>=0?'+':''}${a}%p</div></div>

      <td class="num neg">${v.max_drawdown_pct}%</td>
      <td class=num>${v.num_trades}</td><td class=num>${v.win_rate_pct}%</td></tr>`;}).join('');
  document.getElementById('main').innerHTML=`
    <div class="panel"><div class="p-t">🔬 청산 로직 변형 비교 <span class=muted>· 미장 백테스트 (${VC.period||''})</span></div>
      <div class="p-sub">같은 전략에 청산 규칙만 바꿔 백테스트한 결과. 우리가 실제로 쓸지 '검증 후 채택'하는 근거예요.</div>
      <table><thead><tr><th>변형</th><th class=num>총수익</th><th class=num>CAGR</th><th class=num>최대낙폭</th><th class=num>매매</th><th class=num>승률</th></tr></thead>
      <tbody>${rows}</tbody></table>
      <div class="muted" style="font-size:11px;margin-top:10px">참고: SPY 같은기간 ${VC.benchmark_return_pct}% · 생성 ${(VC.generated_at||'').replace('T',' ')}</div></div>
    <div class="callout" style="background:#FCF6EC;border:1px solid #EAD9BC;border-radius:10px;padding:12px 14px;font-size:12px">
      ⚠️ 백테스트는 생존편향·노이즈가 커서 시장·기간 따라 정답이 뒤집혀요. 곧이곧대로 믿지 말고 '경향' 참고 + 앞으로의 모의 성적으로 판단.</div>`;
}
function renderGuide(){document.getElementById('main').innerHTML=
  `<div class="panel" style="text-align:center;padding:30px">
    <div style="font-size:15px;font-weight:600;margin-bottom:8px">📖 전략 가이드</div>
    <div class="muted" style="margin-bottom:16px">6단계 방법론·게이트·청산 사다리·용어를 정리한 상세 문서</div>
    <a class="btn" href="guide.html" style="display:inline-block">전략 가이드 열기 →</a></div>`;}

function miniSpark(spark,color){
  if(!spark||spark.length<2)return '';
  const lo=Math.min(...spark),hi=Math.max(...spark),rng=(hi-lo)||1,W=46,H=16;
  const pts=spark.map((v,i)=>`${(W*i/(spark.length-1)).toFixed(1)},${(H-1-(H-2)*(v-lo)/rng).toFixed(1)}`).join(' ');
  return `<svg width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.3"/></svg>`;}
function tkHTML(it){
  const up=it.change_pct>=0, c=up?'#C0392B':'#1565C0';   // 한국식: 상승 빨강
  const v=it.value>=100?it.value.toLocaleString(undefined,{maximumFractionDigits:2}):it.value.toFixed(2);
  return `<span class="tk" style="cursor:pointer" onclick="openChart('${it.name}')" title="클릭 → 일봉 차트"><span class="tn">${it.name}</span>${miniSpark(it.spark,c)}<span class="tv">${v}</span><span class="tc" style="color:${c}">${up?'▲':'▼'}${Math.abs(it.change_pct).toFixed(2)}%</span></span>`;
}
function findIdx(name){return [...(IDX&&IDX.items||[]),...(IDX&&IDX.futures||[])].find(x=>x.name===name);}
function candleSVG(ohlc){
  const W=640,H=320,pt=26,pb=22,pl=6,prr=52,N=ohlc.length;
  const lo=Math.min(...ohlc.map(r=>r[3])),hi=Math.max(...ohlc.map(r=>r[2])),rng=(hi-lo)||1;
  const cw=(W-pl-prr)/N, y=v=>pt+(H-pt-pb)*(1-(v-lo)/rng);
  let s='';
  // 가로 그리드 + 가격 라벨(5단)
  for(let k=0;k<=4;k++){const pv=lo+rng*k/4, yy=y(pv);
    s+=`<line x1="${pl}" y1="${yy}" x2="${W-prr}" y2="${yy}" stroke="#eee" stroke-width="1"/>`;
    s+=`<text x="${W-prr+4}" y="${yy+3}" font-size="10" fill="#999">${pv.toLocaleString(undefined,{maximumFractionDigits:2})}</text>`;}
  ohlc.forEach((r,i)=>{const o=r[1],h=r[2],l=r[3],c=r[4];const x=pl+cw*i+cw/2;
    const up=c>=o, col=up?'#C0392B':'#1565C0';
    s+=`<line x1="${x}" y1="${y(h)}" x2="${x}" y2="${y(l)}" stroke="${col}" stroke-width="1"/>`;
    const bw=Math.max(cw*0.62,1.4), yt=y(Math.max(o,c)), yb=y(Math.min(o,c));
    s+=`<rect x="${(x-bw/2).toFixed(1)}" y="${yt.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(yb-yt,1).toFixed(1)}" fill="${col}"/>`;});
  const d0=ohlc[0][0], d1=ohlc[ohlc.length-1][0];
  s+=`<text x="${pl}" y="${H-6}" font-size="10" fill="#999">${d0}</text><text x="${W-prr}" y="${H-6}" text-anchor="end" font-size="10" fill="#999">${d1}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${s}</svg>`;
}
function openChart(name){
  const it=findIdx(name); if(!it||!it.ohlc){return;}
  const up=it.change_pct>=0,c=up?'#C0392B':'#1565C0';
  const v=it.value>=100?it.value.toLocaleString(undefined,{maximumFractionDigits:2}):it.value.toFixed(2);
  document.getElementById('modal-body').innerHTML=
    `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
       <b style="font-size:17px">${it.name}</b><span style="font-size:17px;font-weight:700">${v}</span>
       <span style="color:${c};font-weight:600">${up?'▲':'▼'}${Math.abs(it.change_pct).toFixed(2)}%</span>
       <span class="muted" style="font-size:11px">일봉 · 최근 ${it.ohlc.length}거래일 · 상승 <span style="color:#C0392B">빨강</span>/하락 <span style="color:#1565C0">파랑</span></span></div>`+candleSVG(it.ohlc);
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeAlert();}});
let aDir='above';
function openAlertForm(){document.getElementById('a-msg').textContent='';document.getElementById('amodal').style.display='flex';}
function closeAlert(){document.getElementById('amodal').style.display='none';}
function pickDir(d){aDir=d;document.getElementById('a-above').classList.toggle('on',d==='above');document.getElementById('a-below').classList.toggle('on',d==='below');}
function submitAlert(){
  const sym=document.getElementById('a-sym').value;
  const lvl=(document.getElementById('a-lvl').value||'').replace(/,/g,'').trim();
  const msg=document.getElementById('a-msg');
  if(!lvl||isNaN(Number(lvl))){msg.style.color='#A32D2D';msg.textContent='포인트 숫자를 입력하세요.';return;}
  if(!ACTL){msg.style.color='#A32D2D';msg.textContent='알림 채널이 설정 안 됨(PC에서 설정 필요).';return;}
  msg.style.color='#73726c';msg.textContent='전송 중...';
  fetch('https://ntfy.sh/'+ACTL,{method:'POST',body:'ADD '+sym+' '+lvl+' '+aDir})
    .then(r=>{if(r.ok){msg.style.color='#3B6D11';
      msg.innerHTML='✅ 요청 보냈어요! 곧 등록되고 폰으로 확인 알림이 와요.<br>(최대 10분 내 반영)';}
      else throw new Error(r.status);})
    .catch(e=>{msg.style.color='#A32D2D';msg.textContent='전송 실패: '+e;});
}
function renderTicker(){
  if(!IDX||!IDX.items){document.getElementById('ticker').style.display='none';}
  else document.getElementById('ticker').innerHTML=IDX.items.map(tkHTML).join('');
  const fe=document.getElementById('ticker-fut');
  if(IDX&&IDX.futures&&IDX.futures.length){
    const t=(IDX.generated_at||'').replace('T',' ').slice(0,16);
    fe.innerHTML=`<span class="flabel"><span class="live-dot"></span>선물</span>`+IDX.futures.map(tkHTML).join('')+
      `<span class="tn" style="font-size:10px">· ${t} 기준</span>`;
  } else if(fe) fe.style.display='none';
}
renderTicker();renderSide();renderTabs();renderPulse();
